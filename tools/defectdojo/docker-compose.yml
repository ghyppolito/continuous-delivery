version: '3.8'

services:
  db:
    image: postgres:${POSTGRES_VERSION:-15-alpine}
    container_name: defectdojo_db
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgresql_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:${REDIS_VERSION:-7-alpine}
    container_name: defectdojo_redis
    restart: unless-stopped

  uwsgi:
    image: defectdojo/defectdojo-django:${DD_VERSION:-latest}
    container_name: defectdojo_uwsgi
    depends_on:
      initializer:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - DD_DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - DD_CELERY_BROKER_URL=${REDIS_URL}
      - DD_SECRET_KEY=${DD_SECRET_KEY}
      - DD_CREDENTIAL_AES_256_KEY=${DD_CREDENTIAL_AES_256_KEY}
      - DD_ADMIN_USER=${DD_ADMIN_USER}
      - DD_ADMIN_PASSWORD=${DD_ADMIN_PASSWORD}
      - DD_ADMIN_EMAIL=${DD_ADMIN_EMAIL}
    volumes:
      - defectdojo_media:/app/media
    restart: unless-stopped

  initializer:
    image: defectdojo/defectdojo-django:${DD_VERSION:-latest}
    container_name: defectdojo_initializer
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    entrypoint: ["/entrypoint-initializer.sh"]
    environment:
      - DD_DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - DD_CELERY_BROKER_URL=${REDIS_URL}
      - DD_SECRET_KEY=${DD_SECRET_KEY}
      - DD_CREDENTIAL_AES_256_KEY=${DD_CREDENTIAL_AES_256_KEY}
      - DD_ADMIN_USER=${DD_ADMIN_USER}
      - DD_ADMIN_PASSWORD=${DD_ADMIN_PASSWORD}
      - DD_ADMIN_EMAIL=${DD_ADMIN_EMAIL}
      - DD_INITIALIZE=true

  nginx:
    image: defectdojo/defectdojo-nginx:${DD_VERSION:-latest}
    container_name: defectdojo_nginx
    depends_on:
      - uwsgi
    ports:
      - "8080:8080"
    environment:
      - DD_UWSGI_HOST=uwsgi
      - DD_UWSGI_PORT=3031
    volumes:
      - defectdojo_media:/usr/share/nginx/html/media:ro
    restart: unless-stopped

  worker:
    image: defectdojo/defectdojo-django:${DD_VERSION:-latest}
    container_name: defectdojo_worker
    depends_on:
      initializer:
        condition: service_completed_successfully
      uwsgi:
        condition: service_started
    environment:
      - DD_DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - DD_CELERY_BROKER_URL=${REDIS_URL}
      - DD_SECRET_KEY=${DD_SECRET_KEY}
      - DD_CREDENTIAL_AES_256_KEY=${DD_CREDENTIAL_AES_256_KEY}
    command: celery -A dojo worker -l info --concurrency 2
    restart: unless-stopped

volumes:
  postgresql_data:
  defectdojo_media:
